<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>IA em Jogos - Previsão</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            max-width: 600px;
        }

        input,
        button {
            padding: 10px;
            margin: 5px;
        }

        button {
            background: #22c55e;
            border: none;
            cursor: pointer;
        }

        .resultado {
            font-size: 20px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <h1>🤖 IA para Prever Desempenho</h1>

    <div class="card">
        <h2>📊 Inserir Dados</h2>
        <input type="number" id="pontuacao" placeholder="Pontuação">
        <input type="number" id="tempo" placeholder="Tempo (min)">
        <button onclick="adicionar()">Adicionar</button>
    </div>

    <div class="card">
        <h2>📈 Gráfico</h2>
        <canvas id="grafico"></canvas>
    </div>

    <div class="card">
        <h2>🔮 Previsão da IA</h2>
        <button onclick="prever()">Prever próximo resultado</button>
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        let dados = [];
        let chart;

        // Adicionar dados
        function adicionar() {
            let pontuacao = Number(document.getElementById("pontuacao").value);
            let tempo = Number(document.getElementById("tempo").value);

            if (!pontuacao || !tempo) return;

            dados.push({ pontuacao, tempo });
            atualizarGrafico();
        }

        // Atualizar gráfico
        function atualizarGrafico() {
            let labels = dados.map((_, i) => "Partida " + (i + 1));
            let pontos = dados.map(d => d.pontuacao);

            if (chart) chart.destroy();

            chart = new Chart(document.getElementById('grafico'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Pontuação',
                        data: pontos
                    }]
                }
            });
        }

        // IA simples (modelo baseado em média)
        function prever() {
            if (dados.length < 3) {
                document.getElementById("resultado").innerText =
                    "Adicione pelo menos 3 partidas!";
                return;
            }

            let mediaPontuacao = dados.reduce((s, d) => s + d.pontuacao, 0) / dados.length;
            let mediaTempo = dados.reduce((s, d) => s + d.tempo, 0) / dados.length;

            // Regra simples de "IA"
            let desempenho = mediaPontuacao / mediaTempo;

            let resultado;

            if (desempenho > 10) {
                resultado = "🔥 Alta chance de VITÓRIA";
            } else if (desempenho > 5) {
                resultado = "⚖️ Desempenho MÉDIO";
            } else {
                resultado = "⚠️ Baixa chance de vitória";
            }

            document.getElementById("resultado").innerText =
                `IA diz: ${resultado}`;
        }
    </script>

</body>

</html>
