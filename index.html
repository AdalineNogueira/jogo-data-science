<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Jogo Online - Data Science</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0f172a;
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            border-radius: 12px;
            max-width: 500px;
        }

        input,
        button {
            padding: 10px;
            margin: 5px;
        }
    </style>
</head>

<body>

    <h1>🎮 Jogo Online - Clique Rápido</h1>

    <div class="card">
        <input id="nome" placeholder="Seu nome">
        <br>
        <button onclick="iniciar()">Iniciar</button>
        <h2 id="tempo">Tempo: 10</h2>
        <h2 id="pontos">Pontos: 0</h2>
        <button onclick="clicar()">CLIQUE!</button>
    </div>

    <div class="card">
        <h2>🏆 Ranking ao vivo</h2>
        <ul id="ranking"></ul>
    </div>

    <script>
        // Import the functions you need from the SDKs you need
        //import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        //import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
       const firebaseConfig = {
            apiKey: "AIzaSyDCAY8iK8VxHNhSsrExkfchEL8jaH9rXiI",
            authDomain: "jogo-data-science-e15eb.firebaseapp.com",
            databaseURL: "https://jogo-data-science-e15eb-default-rtdb.firebaseio.com",
            projectId: "jogo-data-science-e15eb",
            storageBucket: "jogo-data-science-e15eb.firebasestorage.app",
            messagingSenderId: "313080801630",
            appId: "1:313080801630:web:94e16181b7355bde8b47cf",
            measurementId: "G-SBBJEL818M"
        };

        //Initialize Firebase
        //const app = initializeApp(firebaseConfig);
        //const analytics = getAnalytics(app);

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let tempo = 10;
        let pontos = 0;
        let jogando = false;

        function iniciar() {
            tempo = 10;
            pontos = 0;
            jogando = true;

            let timer = setInterval(() => {
                tempo--;
                document.getElementById("tempo").innerText = "Tempo: " + tempo;

                if (tempo <= 0) {
                    clearInterval(timer);
                    jogando = false;
                    salvar();
                }
            }, 1000);
        }

        function clicar() {
            if (jogando) {
                pontos++;
                document.getElementById("pontos").innerText = "Pontos: " + pontos;
            }
        }

        // salvar no banco
        function salvar() {
            let nome = document.getElementById("nome").value || "Aluno";

            db.ref("jogos").push({
                nome: nome,
                pontos: pontos,
                tempo: 10,
                desempenho: pontos / 10
            });
        }

        // ranking em tempo real
        db.ref("jogos").on("value", snapshot => {
            let dados = [];

            snapshot.forEach(child => {
                dados.push(child.val());
            });

            dados.sort((a, b) => b.pontos - a.pontos);

            let lista = document.getElementById("ranking");
            lista.innerHTML = "";

            dados.forEach(d => {
                let item = document.createElement("li");
                item.innerText = `${d.nome} - ${d.pontos} pts`;
                lista.appendChild(item);
            });
        });
    </script>

</body>

</html>
